openapi: 3.0.3
info:
  title: ChatPro API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: API available, content: { application/json: { schema: { type: object, required: [name, status, version], properties: { name: { type: string, example: ChatPro API }, status: { type: string, example: ok }, version: { type: string, example: 0.1.0 } } } } } }
  /api/v1/sessions:
    get: { summary: List workspace sessions, parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}], responses: {'200': {description: Session summaries}, '503': {$ref: '#/components/responses/ServiceUnavailable'}} }
    post: { summary: Create session, parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CreateSessionRequest'}}}}, responses: {'201': {description: Session created}, '400': {$ref: '#/components/responses/ValidationError'}, '409': {$ref: '#/components/responses/Conflict'}} }
  /api/v1/sessions/{sessionId}/connect:
    post: { summary: Start controlled connection, parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}, {$ref: '#/components/parameters/SessionId'}], responses: {'204': {description: Connect started}, '503': {$ref: '#/components/responses/ServiceUnavailable'}} }
  /api/v1/sessions/{sessionId}/status:
    get: { summary: Get normalized status, parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}, {$ref: '#/components/parameters/SessionId'}], responses: {'200': {description: Session status}, '404': {$ref: '#/components/responses/NotFound'}} }
  /api/v1/sessions/{sessionId}/qr:
    get: { summary: Get temporary QR (never persisted), parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}, {$ref: '#/components/parameters/SessionId'}], responses: {'200': {description: Temporary QR}, '404': {$ref: '#/components/responses/NotFound'}} }
  /api/v1/sessions/{sessionId}/stop:
    post: { summary: Stop locally and preserve credentials, parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}, {$ref: '#/components/parameters/SessionId'}], responses: {'204': {description: Session stopped}} }
  /api/v1/sessions/{sessionId}/logout:
    post: { summary: Logout and invalidate credentials while keeping metadata, parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}, {$ref: '#/components/parameters/SessionId'}], responses: {'204': {description: Session logged out}} }
  /api/v1/sessions/{sessionId}:
    delete: { summary: Remove session and credentials, parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}, {$ref: '#/components/parameters/SessionId'}], responses: {'204': {description: Session removed}} }
  /api/v1/contacts:
    get: { summary: List contacts, parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}], responses: {'501': {$ref: '#/components/responses/NotImplemented'}} }
  /api/v1/templates:
    get: { summary: List templates, parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}], responses: {'501': {$ref: '#/components/responses/NotImplemented'}} }
    post: { summary: Create template, parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}], responses: {'501': {$ref: '#/components/responses/NotImplemented'}} }
  /api/v1/templates/{templateId}:
    put: { summary: Update template, parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}], responses: {'501': {$ref: '#/components/responses/NotImplemented'}} }
    delete: { summary: Remove template, parameters: [{$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/UserId'}], responses: {'501': {$ref: '#/components/responses/NotImplemented'}} }
components:
  parameters:
    WorkspaceId: { name: x-workspace-id, in: header, required: true, schema: {type: string}, description: Temporary development context; not final authentication. }
    UserId: { name: x-user-id, in: header, required: true, schema: {type: string}, description: Temporary development context; not final authentication. }
    SessionId: { name: sessionId, in: path, required: true, schema: {type: string} }
  schemas:
    CreateSessionRequest: { type: object, properties: {name: {type: string, minLength: 1, maxLength: 120}} }
    Error: { type: object, required: [error], properties: {error: {type: object, required: [code, message, correlationId, details], properties: {code: {type: string}, message: {type: string}, correlationId: {type: string}, details: {type: object}}}} }
  responses:
    NotImplemented: { description: Legacy capability is not migrated, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}} }
    ValidationError: { description: Invalid parameters or body, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}} }
    NotFound: { description: Session or temporary QR not found, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}} }
    Conflict: { description: Conflicting session operation, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}} }
    ServiceUnavailable: { description: Worker unavailable or WhatsApp connection disabled, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}} }
