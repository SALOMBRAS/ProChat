services:
  waha:
    image: devlikeapro/waha:latest-2026.7.1
    container_name: chatpro-waha
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    env_file:
      - .env.local
    environment:
      WHATSAPP_API_HOSTNAME: 0.0.0.0
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WAHA_PRINT_QR: "False"
      WHATSAPP_DOWNLOAD_MEDIA: "false"
      WHATSAPP_API_KEY_EXCLUDE_PATH: health
      WAHA_DASHBOARD_ENABLED: "false"
      WHATSAPP_SWAGGER_ENABLED: "false"
    volumes:
      - ./.waha-sessions:/app/.sessions
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
